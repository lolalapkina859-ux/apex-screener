<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX SCREENER</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b10;--bg2:#0d1117;--bg3:#111820;--border:#1e2a38;--accent:#00e5ff;--green:#00e676;--red:#ff3a6e;--text:#c8d8e8;--muted:#4a6070;--gold:#ffd54f}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;font-size:12px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:6px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--accent);letter-spacing:3px}
.logo span{color:var(--red)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.ticker-tape{flex:1;overflow:hidden}
.ticker-inner{display:flex;gap:20px;animation:scrollx 30s linear infinite;white-space:nowrap}
@keyframes scrollx{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tk{display:inline-flex;gap:6px;align-items:center;font-size:11px}
.tk .s{color:var(--text);font-weight:700}.tk .p{color:var(--muted)}
.up{color:var(--green)}.dn{color:var(--red)}
.main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:198px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.srch{padding:8px;border-bottom:1px solid var(--border)}
.srch input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 8px;font-family:'Space Mono',monospace;font-size:11px;outline:none;border-radius:3px}
.srch input:focus{border-color:var(--accent)}
.srch input::placeholder{color:var(--muted)}
.plist{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.pi{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;cursor:pointer;border-bottom:1px solid rgba(30,42,56,.4);transition:background .12s;position:relative;gap:4px}
.pi:hover{background:rgba(0,229,255,.04)}
.pi.active{background:rgba(0,229,255,.08);border-left:2px solid var(--accent)}
.pn{color:var(--text);font-weight:700;font-size:11px}
.pm{font-size:9px;color:var(--muted)}
.pi-r{text-align:right;flex-shrink:0}
.pp{font-size:11px}.pc{font-size:10px}
.sbadge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;margin-top:2px;display:inline-block}
.sbadge.BUY{background:rgba(0,230,118,.2);color:var(--green)}
.sbadge.SELL{background:rgba(255,58,110,.2);color:var(--red)}

/* CHART AREA */
.chart-area{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* TABS inside chart area */
.area-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.atab{padding:8px 18px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;letter-spacing:.5px;position:relative}
.atab:hover{color:var(--text)}
.atab.on{color:var(--accent);border-bottom-color:var(--accent)}
.atab .badge{position:absolute;top:4px;right:4px;background:var(--red);color:#fff;font-size:8px;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}

.tab-pane{display:none;flex:1;flex-direction:column;overflow:hidden}
.tab-pane.on{display:flex}

/* CHART HEADER */
.chart-header{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.chart-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--accent)}
.chart-price{font-size:18px;font-weight:700;font-family:'Syne',sans-serif}
.chg{padding:2px 7px;border-radius:3px;font-size:11px;font-weight:700}
.chg.up{background:rgba(0,230,118,.15);color:var(--green)}.chg.dn{background:rgba(255,58,110,.15);color:var(--red)}
.ohlc{display:flex;gap:8px;font-size:10px;color:var(--muted);margin-left:auto;flex-wrap:wrap}
.tf-row,.ind-row{display:flex;gap:3px}
.tbtn,.ibtn{padding:3px 7px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:'Space Mono',monospace;font-size:10px;border-radius:3px;transition:all .15s}
.tbtn:hover,.ibtn:hover{border-color:var(--accent);color:var(--accent)}
.tbtn.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.ibtn.on{background:rgba(0,229,255,.1);border-color:var(--accent);color:var(--accent)}

/* CHARTS */
.cwrap{flex:1;display:flex;flex-direction:column;padding:6px;gap:5px;overflow:hidden}
.mainbox{flex:1;position:relative;background:var(--bg3);border:1px solid var(--border);border-radius:4px;overflow:hidden;cursor:crosshair;min-height:0;user-select:none}
.subrow{display:flex;gap:5px;height:90px;flex-shrink:0}
.subbox{flex:1;position:relative;background:var(--bg3);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.sublabel{position:absolute;top:4px;left:7px;font-size:9px;color:var(--muted);z-index:2;pointer-events:none}
canvas{display:block;position:absolute;left:0}
.loader{position:absolute;inset:0;background:rgba(8,11,16,.85);display:flex;align-items:center;justify-content:center;z-index:10}
.spin{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* SIGNALS PANE */
.sig-toolbar{display:flex;align-items:center;gap:4px;padding:7px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sf{padding:3px 8px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:'Space Mono',monospace;font-size:10px;border-radius:3px;transition:all .15s}
.sf:hover{border-color:var(--accent);color:var(--accent)}
.sf.on{background:rgba(0,229,255,.1);border-color:var(--accent);color:var(--accent)}
.sf.buy.on{background:rgba(0,230,118,.1);border-color:var(--green);color:var(--green)}
.sf.sell.on{background:rgba(255,58,110,.1);border-color:var(--red);color:var(--red)}
.sig-count-label{margin-left:auto;font-size:10px;color:var(--muted)}

.sig-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sig-thead{display:grid;grid-template-columns:90px 60px 70px 50px 1fr;padding:5px 10px;font-size:9px;color:var(--muted);letter-spacing:1px;border-bottom:1px solid var(--border);text-transform:uppercase;position:sticky;top:0;background:var(--bg2);z-index:2}
.sig-item{display:grid;grid-template-columns:90px 60px 70px 50px 1fr;padding:8px 10px;border-bottom:1px solid rgba(30,42,56,.4);cursor:pointer;transition:background .15s;align-items:center;gap:0}
.sig-item:hover{background:rgba(0,229,255,.04)}
.sig-item.fresh{animation:flashrow .8s ease}
@keyframes flashrow{0%{background:rgba(0,229,255,.2)}100%{background:transparent}}
.si-pair{font-size:11px;font-weight:700}
.si-time{font-size:9px;color:var(--muted)}
.si-price{font-size:10px}
.si-type{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;text-align:center;width:fit-content}
.si-type.BUY{background:rgba(0,230,118,.2);color:var(--green)}
.si-type.SELL{background:rgba(255,58,110,.2);color:var(--red)}
.si-stars{font-size:11px;color:var(--gold);letter-spacing:2px}
.si-pnl{font-size:10px;font-weight:700}
.si-pnl.pos{color:var(--green)}.si-pnl.neg{color:var(--red)}.si-pnl.neu{color:var(--muted)}
.sig-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:10px}
.sig-empty-ico{font-size:36px;opacity:.25}

/* RIGHT PANEL */
.rpanel{width:172px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.rsec{border-bottom:1px solid var(--border);padding:9px}
.rtitle{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:7px}
.srow{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.slabel{color:var(--muted);font-size:10px}.sval{font-size:11px;font-weight:700}
.gbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:5px}
.gfill{height:100%;border-radius:2px;transition:width .5s,background .5s}
.sigbox{padding:8px;border-radius:4px;text-align:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;letter-spacing:1px;margin-top:5px}
.sigbox.BUY{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.sigbox.SELL{background:rgba(255,58,110,.15);color:var(--red);border:1px solid rgba(255,58,110,.3)}
.sigbox.NEUTRAL{background:rgba(255,213,79,.08);color:var(--gold);border:1px solid rgba(255,213,79,.2)}
.stars{text-align:center;font-size:13px;margin-top:4px;letter-spacing:3px;color:var(--gold)}
.ob{flex:1;overflow:hidden;padding:9px;display:flex;flex-direction:column}
.obrow{display:flex;justify-content:space-between;margin-bottom:3px;font-size:10px;position:relative;padding:1px 4px}
.obbar{position:absolute;top:0;bottom:0;right:0;opacity:.12;border-radius:2px}
.ask .obbar{background:var(--red)}.bid .obbar{background:var(--green)}
.ask .obp{color:var(--red)}.bid .obp{color:var(--green)}
.obs{color:var(--muted)}
.obspread{text-align:center;color:var(--gold);font-size:9px;padding:3px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:3px 0}

/* TOAST */
#toastwrap{position:fixed;top:50px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:300px}
.toast{background:#0d1520;border:1px solid var(--border);border-radius:10px;padding:14px 16px 12px;box-shadow:0 8px 40px rgba(0,0,0,.6);animation:tin .35s cubic-bezier(.2,.8,.3,1);pointer-events:all;cursor:pointer;position:relative;overflow:hidden}
.toast::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.toast.BUY::before{background:var(--green)}
.toast.SELL::before{background:var(--red)}
@keyframes tin{from{opacity:0;transform:translateX(30px) scale(.95)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes tout{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(30px)}}
.toast-emoji{font-size:28px;margin-bottom:6px}
.toast-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;margin-bottom:3px}
.toast.BUY .toast-title{color:var(--green)}.toast.SELL .toast-title{color:var(--red)}
.toast-pair{font-size:13px;font-weight:700;color:var(--accent)}
.toast-detail{font-size:11px;color:var(--text);margin-top:4px;line-height:1.6}
.toast-stars{font-size:14px;color:var(--gold);letter-spacing:3px;margin-top:4px}
.toast-x{position:absolute;top:8px;right:10px;color:var(--muted);font-size:13px;cursor:pointer;line-height:1}
.toast-bar{position:absolute;bottom:0;left:0;height:2px;background:var(--accent);animation:tbar 5s linear forwards}
@keyframes tbar{from{width:100%}to{width:0}}
</style>
</head>
<body>
<div id="toastwrap"></div>

<div class="topbar">
  <div class="logo">APEX<span>X</span></div>
  <div class="live-dot"></div>
  <div class="ticker-tape"><div class="ticker-inner" id="ticker"></div></div>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="srch"><input type="text" id="search" placeholder="Поиск..." oninput="filterList(this.value)"></div>
    <div class="plist" id="plist"></div>
  </div>

  <!-- CENTER -->
  <div class="chart-area">
    <div class="area-tabs">
      <div class="atab on" onclick="switchTab('chart',this)">📈 CHART</div>
      <div class="atab" onclick="switchTab('signals',this)" id="sigTab">🔥 СИГНАЛЫ <span class="badge" id="sigBadge" style="display:none">0</span></div>
    </div>

    <!-- CHART PANE -->
    <div class="tab-pane on" id="paneChart">
      <div class="chart-header">
        <div class="chart-title" id="hTitle">—</div>
        <div class="chart-price" id="hPrice">—</div>
        <div class="chg" id="hChg">—</div>
        <div class="ohlc" id="hOhlc"><span>O:—</span><span>H:—</span><span>L:—</span><span>C:—</span><span>V:—</span></div>
        <div class="tf-row">
          <button class="tbtn" onclick="setTF(this,'1m')">1m</button>
          <button class="tbtn on" onclick="setTF(this,'5m')">5m</button>
          <button class="tbtn" onclick="setTF(this,'15m')">15m</button>
          <button class="tbtn" onclick="setTF(this,'1h')">1h</button>
          <button class="tbtn" onclick="setTF(this,'4h')">4h</button>
          <button class="tbtn" onclick="setTF(this,'1d')">1D</button>
        </div>
        <div class="ind-row">
          <button class="ibtn on" id="bEma"   onclick="tog('ema',this)">EMA</button>
          <button class="ibtn on" id="bBb"    onclick="tog('bb',this)">BB</button>
          <button class="ibtn on" id="bVol"   onclick="tog('vol',this)">VOL</button>
          <button class="ibtn on" id="bTrail" onclick="tog('trail',this)">TRAIL</button>
        </div>
      </div>
      <div class="cwrap">
        <div class="mainbox" id="mainbox">
          <div class="loader" id="loader"><div class="spin"></div></div>
          <canvas id="cvMain"></canvas>
        </div>
        <div class="subrow">
          <div class="subbox" id="rsibox"><div class="sublabel">RSI(14)</div><canvas id="cvRsi"></canvas></div>
          <div class="subbox" id="macdbox"><div class="sublabel">MACD(12,26,9)</div><canvas id="cvMacd"></canvas></div>
        </div>
      </div>
    </div>

    <!-- SIGNALS PANE -->
    <div class="tab-pane" id="paneSignals">
      <div class="sig-toolbar">
        <button class="sf on" id="sfAll"  onclick="setSigFilter('all',this)">ВСЕ</button>
        <button class="sf buy" id="sfBuy"  onclick="setSigFilter('buy',this)">BUY</button>
        <button class="sf sell" id="sfSell" onclick="setSigFilter('sell',this)">SELL</button>
        <button class="sf" onclick="clearSignals()">ОЧИСТИТЬ</button>
        <span class="sig-count-label" id="sigCountLabel">0 сигналов</span>
      </div>
      <div class="sig-thead">
        <span>ПАРА</span><span>ТИП</span><span>ЦЕНА</span><span>ЗВЁЗДЫ</span><span>P&L</span>
      </div>
      <div class="sig-list" id="sigList">
        <div class="sig-empty" id="sigEmpty">
          <div class="sig-empty-ico">🔍</div>
          <div>Сигналов пока нет</div>
          <div style="font-size:10px;color:var(--muted)">Ждём пересечений Smart Trail...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="rpanel">
    <div class="rsec">
      <div class="rtitle">Stats 24h</div>
      <div class="srow"><span class="slabel">High</span><span class="sval up" id="rHigh">—</span></div>
      <div class="srow"><span class="slabel">Low</span><span class="sval dn" id="rLow">—</span></div>
      <div class="srow"><span class="slabel">Volume</span><span class="sval" id="rVol">—</span></div>
      <div class="srow"><span class="slabel">Q.Vol $</span><span class="sval" id="rQvol">—</span></div>
    </div>
    <div class="rsec">
      <div class="rtitle">Smart Signal Pro</div>
      <div class="srow"><span class="slabel">RSI</span><span class="sval" id="rRsi">—</span></div>
      <div class="srow"><span class="slabel">MACD</span><span class="sval" id="rMacd">—</span></div>
      <div class="srow"><span class="slabel">EMA20</span><span class="sval" id="rEma">—</span></div>
      <div class="srow"><span class="slabel">Trail</span><span class="sval" id="rTrail">—</span></div>
      <div class="gbar"><div class="gfill" id="gfill" style="width:50%"></div></div>
      <div class="sigbox NEUTRAL" id="sigbox">NEUTRAL</div>
      <div class="stars" id="stars">☆☆☆☆</div>
    </div>
    <div class="ob">
      <div class="rtitle">Order Book</div>
      <div id="asks"></div>
      <div class="obspread" id="spread">Spread: —</div>
      <div id="bids"></div>
    </div>
  </div>
</div>

<script>
// ═══ PAIRS ═══
const PAIRS=[
  'ORDIUSDT','DOTUSDT','ZECUSDT','LTCUSDT','1000PEPEUSDT',
  'DYDXUSDT','ARBUSDT','XRPUSDT','SUIUSDT','AAVEUSDT',
  'WIFUSDT','LDOUSDT','XAUTUSDT','AXSUSDT','SOLUSDT',
  'BTCUSDT','UNIUSDT','AVAXUSDT','LINKUSDT','ETHUSDT',
  'ENAUSDT','NEARUSDT','HYPEUSDT'
];
const TF_LIM={'1m':150,'5m':150,'15m':120,'1h':120,'4h':100,'1d':80};
const TP=[3.5,5.0,7.0,11.0]; const SL_PCT=8.0;

// ═══ STATE ═══
const S={
  pair:'BTCUSDT',tf:'5m',candles:[],
  prices:{},chgs:{},sigs:{},prevSigs:{},
  ind:{ema:true,bb:true,vol:true,trail:true},
  view:{vis:80,off:0},
  drag:{on:false,x0:0,off0:0},
  mouse:{x:0,y:0,in:false},
  ws:null,wob:null,ob:{asks:[],bids:[]},
  signals:[],  // {pair,type,price,stars,quality,time,currentPrice}
  sigFilter:'all'
};

// ═══ MATH ═══
function calcEMA(d,p){
  const k=2/(p+1),o=new Array(d.length).fill(null);
  let s=0;
  for(let i=0;i<d.length;i++){
    if(i<p-1){s+=d[i];continue}
    if(i===p-1){o[i]=(s+d[i])/p;continue}
    o[i]=d[i]*k+o[i-1]*(1-k);
  }
  return o;
}
function calcATR(cs,p=10){
  const tr=cs.map((c,i)=>i===0?c.h-c.l:Math.max(c.h-c.l,Math.abs(c.h-cs[i-1].c),Math.abs(c.l-cs[i-1].c)));
  const o=new Array(cs.length).fill(null);
  let s=0;
  for(let i=0;i<tr.length;i++){
    if(i<p-1){s+=tr[i];continue}
    if(i===p-1){o[i]=(s+tr[i])/p;continue}
    o[i]=(o[i-1]*(p-1)+tr[i])/p;
  }
  return o;
}
function calcTrail(cs,sens=5){
  const a=calcATR(cs);
  const t=new Array(cs.length).fill(null);
  for(let i=0;i<cs.length;i++){
    const src=cs[i].c,nL=(a[i]||0)*sens;
    if(i===0||t[i-1]===null){t[i]=src-nL;continue}
    const prev=t[i-1],ps=cs[i-1].c;
    if(src>prev&&ps>prev)      t[i]=Math.max(prev,src-nL);
    else if(src<prev&&ps<prev) t[i]=Math.min(prev,src+nL);
    else if(src>prev)          t[i]=src-nL;
    else                       t[i]=src+nL;
  }
  return t;
}
function calcRSI(d,p=14){
  const o=new Array(d.length).fill(50);
  for(let i=p;i<d.length;i++){
    let g=0,l=0;
    for(let j=i-p+1;j<=i;j++){const x=d[j]-d[j-1];x>0?g+=x:l-=x}
    o[i]=100-100/(1+(l===0?999:g/l));
  }
  return o;
}
function calcMACD(d){
  const e12=calcEMA(d,12),e26=calcEMA(d,26);
  const m=d.map((_,i)=>e12[i]!=null&&e26[i]!=null?e12[i]-e26[i]:null);
  const sig=calcEMA(m.map(v=>v??0),9);
  const h=m.map((v,i)=>v!=null&&sig[i]!=null?v-sig[i]:null);
  return{m,sig,h};
}
function calcBB(d,p=20,mul=2){
  return d.map((_,i)=>{
    if(i<p-1)return null;
    const sl=d.slice(i-p+1,i+1),mean=sl.reduce((a,b)=>a+b,0)/p;
    const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mean)**2,0)/p);
    return{u:mean+mul*std,m:mean,l:mean-mul*std};
  });
}
function smartSig(cs){
  if(cs.length<30)return{sig:'NEUTRAL',stars:'☆☆☆☆',bpct:.5,trail:null,rsiV:50,macdV:null,buy:false,sell:false};
  const cl=cs.map(c=>c.c),tr=calcTrail(cs),r=calcRSI(cl),{m:md,sig:sg}=calcMACD(cl),a=calcATR(cs);
  const i=cs.length-1;
  const src=cl[i],t=tr[i],tp=tr[i-1],sp=cl[i-1];
  const buy=sp<=tp&&src>t,sell=sp>=tp&&src<t;
  const vols=cs.slice(-21).map(c=>c.v);
  const vma=vols.slice(0,-1).reduce((a,b)=>a+b,0)/20;
  const vs=vols[20]>vma*2?2:vols[20]>vma*1.5?1:0;
  const ama=a.filter(v=>v!=null).slice(-20).reduce((a,b)=>a+b,0)/20;
  const as=(a[i]||0)>ama?1:0;
  const q=Math.min(vs+as+1,4);
  const stars='★'.repeat(q)+'☆'.repeat(4-q);
  let bull=0,bear=0;
  if(src>t)bull+=2;else bear+=2;
  const lr=r[i];if(lr<40)bull+=2;else if(lr>60)bear+=2;
  if(md[i]!=null&&sg[i]!=null&&md[i]>sg[i])bull+=2;else bear+=2;
  const bpct=bull/(bull+bear);
  let sig=bpct>.6?'BUY':bpct<.4?'SELL':'NEUTRAL';
  if(buy)sig='BUY';if(sell)sig='SELL';
  return{sig,stars,bpct,trail:t,rsiV:lr,macdV:md[i],buy,sell,quality:q};
}

async function fetchTicker(p){
  try{
    const r=await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${p}`);
    if(!r.ok)return;
    const d=await r.json();
    S.prices[p]=+d.lastPrice;S.chgs[p]=+d.priceChangePercent;
    updRow(p);
    if(p===S.pair){
      set('rHigh',fmt(d.highPrice));set('rLow',fmt(d.lowPrice));
      set('rVol',fmtV(d.volume));set('rQvol',fmtV(d.quoteVolume));
      updHeader();
    }
    // update PnL in signals table
    updSigPnl(p,+d.lastPrice);
  }catch(e){}
}
async function fetchKlines(p,tf){
  const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${p}&interval=${tf}&limit=${TF_LIM[tf]||120}`);
  if(!r.ok)throw new Error('fail');
  return(await r.json()).map(k=>({t:+k[0],o:+k[1],h:+k[2],l:+k[3],c:+k[4],v:+k[5]}));
}

function clearSignals(){

function addSignal(pair,type,price,stars,quality){
  // avoid duplicate within 1 minute
  const now=Date.now();
  const recent=S.signals.find(s=>s.pair===pair&&s.type===type&&now-s.time<60000);
  if(recent)return;
  S.signals.unshift({pair,type,price,stars,quality,time:now,entryPrice:price,id:now});
  if(S.signals.length>100)S.signals.pop();
  renderSigList();
  showToast(pair,type,price,stars,quality);
  // badge
  const b=document.getElementById('sigBadge');
  const activeTab=document.querySelector('.atab.on');
  if(!activeTab||!activeTab.textContent.includes('СИГНАЛ')){
    b.style.display='flex';b.textContent=Math.min(S.signals.length,99);
  }
}
function updSigPnl(pair,currentPrice){
  S.signals.filter(s=>s.pair===pair).forEach(s=>{
    s.currentPrice=currentPrice;
    const pct=(currentPrice-s.entryPrice)/s.entryPrice*100*(s.type==='SELL'?-1:1);
    s.pnl=pct;
  });
  // re-render only pnl cells without full redraw
  S.signals.forEach(s=>{
    if(s.pair!==pair)return;
    const el=document.getElementById(`spnl-${s.id}`);
    if(!el)return;
    if(s.pnl==null){el.textContent='—';el.className='si-pnl neu';return;}
    el.textContent=(s.pnl>=0?'+':'')+s.pnl.toFixed(2)+'%';
    el.className='si-pnl '+(s.pnl>0?'pos':s.pnl<0?'neg':'neu');
  });
}
function renderSigList(){
  const list=document.getElementById('sigList');
  const empty=document.getElementById('sigEmpty');
  let filtered=S.signals;
  if(sigFilter==='buy')filtered=S.signals.filter(s=>s.type==='BUY');
  else if(sigFilter==='sell')filtered=S.signals.filter(s=>s.type==='SELL');
  set('sigCountLabel',filtered.length+' сигналов');
  if(!filtered.length){
    list.innerHTML='';
    list.appendChild(document.getElementById('sigEmpty')||createEmpty());
    document.getElementById('sigEmpty').style.display='flex';
    return;
  }
  document.getElementById('sigEmpty').style.display='none';
  list.innerHTML=filtered.map((s,idx)=>{
    const ago=fmtAgo(s.time);
    const pnlStr=s.pnl!=null?(s.pnl>=0?'+':'')+s.pnl.toFixed(2)+'%':'—';
    const pnlCls=s.pnl>0?'pos':s.pnl<0?'neg':'neu';
    return`<div class="sig-item${idx===0&&Date.now()-s.time<3000?' fresh':''}" onclick="pick('${s.pair}')">
      <div><div class="si-pair">${s.pair.replace('USDT','/USDT')}</div><div class="si-time">${ago}</div></div>
      <div><span class="si-type ${s.type}">${s.type}</span></div>
      <div class="si-price">${fmt(s.entryPrice)}</div>
      <div class="si-stars">${s.stars}</div>
      <div class="si-pnl ${pnlCls}" id="spnl-${s.id}">${pnlStr}</div>
    </div>`;
  }).join('');
}
function createEmpty(){
  const d=document.createElement('div');d.className='sig-empty';d.id='sigEmpty';
  d.innerHTML='<div class="sig-empty-ico">🔍</div><div>Сигналов пока нет</div><div style="font-size:10px;color:var(--muted)">Ждём пересечений Smart Trail...</div>';

function fmtAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return s+'с назад';
  if(s<3600)return Math.floor(s/60)+'м назад';
  return Math.floor(s/3600)+'ч назад';
}

function showToast(pair,type,price,stars,quality){

function playBeep(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const freqs=type==='BUY'?[523,659,784]:[784,659,523];
    freqs.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+i*.12);
      g.gain.linearRampToValueAtTime(.18,ctx.currentTime+i*.12+.05);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+i*.12+.18);
      o.start(ctx.currentTime+i*.12);o.stop(ctx.currentTime+i*.12+.2);
    });
  }catch(e){}
}

// ═══ DRAW MAIN ═══
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}

function drawMain(){
  const cs=getView();if(!cs.length)return;
  const box=document.getElementById('mainbox'),cv=document.getElementById('cvMain');
  const W=box.clientWidth,H=box.clientHeight;
  cv.width=W;cv.height=H;cv.style.top='0';
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const n=cs.length;
  const PL=70,PR=60,PT=18,PB=24;
  const CW=W-PL-PR,CH=H-PT-PB;
  const slot=CW/n,bw=Math.max(1.5,slot*.72-1);
  const cl=cs.map(c=>c.c);
  // wider padding so TP/SL labels fit and candles always visible
  const rawMin=Math.min(...cs.map(c=>c.l));
  const rawMax=Math.max(...cs.map(c=>c.h));
  const pad=(rawMax-rawMin)*0.18;
  const minP=rawMin-pad;
  const maxP=rawMax+pad;
  const rng=maxP-minP||1;
  const tx=i=>PL+i*slot+slot/2;
  const ty=p=>PT+CH-(p-minP)/rng*CH;

  // Grid
  ctx.font='9px Space Mono';ctx.textAlign='right';ctx.fillStyle='#4a6070';
  for(let i=0;i<=5;i++){
    const y=PT+CH/5*i;
    ctx.strokeStyle='rgba(30,42,56,.9)';ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W-PR,y);ctx.stroke();
    ctx.fillText(fmt(maxP-rng/5*i),PL-3,y+3);
  }

  // Volume
  if(S.ind.vol){
    const vs=cs.map(c=>c.v),mv=Math.max(...vs),vh=CH*.18;
    cs.forEach((c,i)=>{
      const h=(c.v/mv)*vh;
      ctx.fillStyle=c.c>=c.o?'rgba(0,230,118,.13)':'rgba(255,58,110,.13)';
      ctx.fillRect(tx(i)-bw/2,PT+CH-h,bw,h);
    });
  }

  // BB
  if(S.ind.bb){
    const B=calcBB(cl);
    const dl=(arr,col,dash)=>{
      ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=1;ctx.setLineDash(dash?[4,4]:[]);
      let s=false;arr.forEach((v,i)=>{if(!v)return;s?ctx.lineTo(tx(i),ty(v)):ctx.moveTo(tx(i),ty(v));s=true;});
      ctx.stroke();ctx.setLineDash([]);
    };
    dl(B.map(v=>v?.u),'rgba(0,229,255,.32)',false);
    dl(B.map(v=>v?.l),'rgba(0,229,255,.32)',false);
    dl(B.map(v=>v?.m),'rgba(0,229,255,.14)',true);
    ctx.beginPath();let s2=false;
    B.forEach((v,i)=>{if(!v)return;s2?ctx.lineTo(tx(i),ty(v.u)):ctx.moveTo(tx(i),ty(v.u));s2=true;});
    [...B].reverse().forEach((v,ri)=>{if(!v)return;ctx.lineTo(tx(n-1-ri),ty(v.l));});
    ctx.closePath();ctx.fillStyle='rgba(0,229,255,.03)';ctx.fill();
  }

  // EMA
  if(S.ind.ema){
    const de=(p,col)=>{
      const e=calcEMA(cl,p);ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.setLineDash([]);
      let s=false;e.forEach((v,i)=>{if(v==null)return;s?ctx.lineTo(tx(i),ty(v)):ctx.moveTo(tx(i),ty(v));s=true;});ctx.stroke();
    };
    de(20,'#ffd54f');de(50,'#ff7043');
  }

  // Smart Trail + arrows + TP/SL lines
  if(S.ind.trail){
    const tr=calcTrail(cs);
    // Trail line
    ctx.lineWidth=2;ctx.setLineDash([]);
    for(let i=1;i<n;i++){
      if(tr[i]==null||tr[i-1]==null)continue;
      ctx.strokeStyle=cs[i].c>tr[i]?'rgba(0,230,118,.75)':'rgba(255,58,110,.75)';
      ctx.beginPath();ctx.moveTo(tx(i-1),ty(tr[i-1]));ctx.lineTo(tx(i),ty(tr[i]));ctx.stroke();
    }
    // Signals
    for(let i=1;i<n;i++){
      if(tr[i]==null||tr[i-1]==null)continue;
      const buy=cs[i-1].c<=tr[i-1]&&cs[i].c>tr[i];
      const sell=cs[i-1].c>=tr[i-1]&&cs[i].c<tr[i];
      if(!buy&&!sell)continue;
      const x=tx(i),ep=cs[i].c,mult=buy?1:-1;

      // ── Arrow (small, clean like TradingView) ──
      const arrowY=buy?ty(cs[i].l)-6:ty(cs[i].h)+6;
      ctx.save();
      ctx.shadowColor=buy?'rgba(0,230,118,.6)':'rgba(255,58,110,.6)';
      ctx.shadowBlur=8;
      // small triangle
      ctx.beginPath();
      if(buy){
        ctx.moveTo(x,arrowY-10);ctx.lineTo(x+6,arrowY+2);ctx.lineTo(x-6,arrowY+2);
      }else{
        ctx.moveTo(x,arrowY+10);ctx.lineTo(x+6,arrowY-2);ctx.lineTo(x-6,arrowY-2);
      }
      ctx.closePath();
      ctx.fillStyle=buy?'#00e676':'#ff3a6e';ctx.fill();
      ctx.shadowBlur=0;ctx.restore();

      // ── BUY/SELL badge below/above arrow ──
      const badgeY=buy?arrowY+14:arrowY-14;
      ctx.font='bold 9px Space Mono';ctx.textAlign='center';
      const btext=buy?'BUY':'SELL';
      const btw=ctx.measureText(btext).width+8;
      ctx.fillStyle=buy?'rgba(0,230,118,.25)':'rgba(255,58,110,.25)';
      rr(ctx,x-btw/2,badgeY-9,btw,13,3);ctx.fill();
      ctx.strokeStyle=buy?'rgba(0,230,118,.6)':'rgba(255,58,110,.6)';
      ctx.lineWidth=.5;ctx.setLineDash([]);
      rr(ctx,x-btw/2,badgeY-9,btw,13,3);ctx.stroke();
      ctx.fillStyle=buy?'#00e676':'#ff3a6e';
      ctx.fillText(btext,x,badgeY+1);

      // ── TP/SL lines with TradingView-style end badges ──
      // Only draw lines that are within visible price range
      const drawTPSL=(price,color,label,pct,dash)=>{
        const lineY=ty(price);
        if(lineY<PT-2||lineY>PT+CH+2)return;
        // dashed line from signal candle to right edge
        ctx.strokeStyle=color;ctx.lineWidth=1;ctx.setLineDash(dash?[6,4]:[]);
        ctx.beginPath();ctx.moveTo(x,lineY);ctx.lineTo(W-PR,lineY);ctx.stroke();
        ctx.setLineDash([]);
        // badge at right edge (TradingView style)
        const bLabel=`${label} ${pct}%`;
        ctx.font='bold 9px Space Mono';
        const bw2=ctx.measureText(bLabel).width+10;
        const bx=W-PR+2,by=lineY-9,bh=16;
        ctx.fillStyle=label==='SL'?'rgba(255,58,110,.85)':'rgba(0,180,100,.85)';
        rr(ctx,bx,by,bw2,bh,3);ctx.fill();
        ctx.fillStyle='#fff';ctx.textAlign='left';
        ctx.fillText(bLabel,bx+5,lineY+4);
      };
      TP.forEach((t,idx)=>{
        drawTPSL(ep*(1+mult*t/100),'rgba(0,230,118,.55)',`TP${idx+1}`,t,true);
      });
      drawTPSL(ep*(1-mult*SL_PCT/100),'rgba(255,58,110,.7)','SL',SL_PCT,true);
    }
  }

  // Candles
  ctx.setLineDash([]);
  cs.forEach((c,i)=>{
    const up=c.c>=c.o,x=tx(i),oy=ty(c.o),cy2=ty(c.c),hy=ty(c.h),ly=ty(c.l);
    ctx.strokeStyle=up?'#00e676':'#ff3a6e';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,hy);ctx.lineTo(x,ly);ctx.stroke();
    ctx.fillStyle=up?'#00e676':'#ff3a6e';
    ctx.fillRect(x-bw/2,Math.min(oy,cy2),bw,Math.max(1.5,Math.abs(cy2-oy)));
  });

  // Time axis
  const step=Math.max(1,Math.ceil(n/8));
  ctx.fillStyle='#4a6070';ctx.font='9px Space Mono';ctx.textAlign='center';ctx.setLineDash([]);
  for(let i=0;i<n;i+=step)ctx.fillText(fmtT(cs[i].t,S.tf),tx(i),H-5);

  // Current price line
  const lp=cs[n-1].c,lpy=ty(lp);
  ctx.strokeStyle='rgba(0,229,255,.4)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(PL,lpy);ctx.lineTo(W-PR,lpy);ctx.stroke();
  ctx.setLineDash([]);
  // price badge on right axis
  const priceTxt=fmt(lp);
  ctx.font='bold 9px Space Mono';
  const ptw=ctx.measureText(priceTxt).width+10;
  ctx.fillStyle='#00e5ff';
  rr(ctx,W-PR+2,lpy-9,ptw,16,3);ctx.fill();
  ctx.fillStyle='#080b10';ctx.textAlign='left';
  ctx.fillText(priceTxt,W-PR+7,lpy+4);

  // Crosshair
  if(S.mouse.in){
    const mx=S.mouse.x,my=S.mouse.y;
    if(mx>PL&&mx<W-PR&&my>PT&&my<PT+CH){
      ctx.strokeStyle='rgba(200,216,232,.2)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(mx,PT);ctx.lineTo(mx,PT+CH);ctx.stroke();
      ctx.beginPath();ctx.moveTo(PL,my);ctx.lineTo(W-PR,my);ctx.stroke();
      ctx.setLineDash([]);
      const hp=maxP-(my-PT)/CH*rng;
      ctx.fillStyle='#131c28';ctx.fillRect(1,my-9,PL-5,18);
      ctx.fillStyle='#c8d8e8';ctx.font='9px Space Mono';ctx.textAlign='right';
      ctx.fillText(fmt(hp),PL-5,my+3);
      const ci=Math.min(n-1,Math.max(0,Math.floor((mx-PL)/slot)));
      const tl=fmtT(cs[ci].t,S.tf);
      const tw=ctx.measureText(tl).width+8;
      ctx.fillStyle='#131c28';ctx.fillRect(mx-tw/2,PT+CH+2,tw,14);
      ctx.fillStyle='#c8d8e8';ctx.textAlign='center';ctx.font='9px Space Mono';
      ctx.fillText(tl,mx,PT+CH+12);
      updOhlc(cs[ci]);
    }
  }
}

// ═══ RSI ═══
function drawRSI(){
  const cs=getView();if(!cs.length)return;
  const box=document.getElementById('rsibox'),cv=document.getElementById('cvRsi');
  const W=box.clientWidth,H=box.clientHeight-18;
  cv.width=W;cv.height=H;cv.style.top='18px';
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,W,H);
  const r=calcRSI(cs.map(c=>c.c)),n=r.length;
  const tx=i=>(n<2?W/2:i/(n-1))*W,ty=v=>H-(v/100)*H;
  ctx.fillStyle='rgba(255,58,110,.05)';ctx.fillRect(0,0,W,ty(70));
  ctx.fillStyle='rgba(0,230,118,.05)';ctx.fillRect(0,ty(30),W,H-ty(30));
  [70,50,30].forEach(l=>{
    ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(0,ty(l));ctx.lineTo(W,ty(l));ctx.stroke();
    ctx.fillStyle='#4a6070';ctx.font='8px Space Mono';ctx.textAlign='left';ctx.fillText(l,2,ty(l)-1);
  });
  ctx.beginPath();ctx.lineWidth=1.5;
  r.forEach((v,i)=>{i?ctx.lineTo(tx(i),ty(v)):ctx.moveTo(tx(i),ty(v))});
  const g=ctx.createLinearGradient(0,0,W,0);
  g.addColorStop(0,'rgba(0,229,255,.3)');g.addColorStop(1,'#00e5ff');
  ctx.strokeStyle=g;ctx.stroke();
  const lr=r[n-1];
  ctx.beginPath();ctx.arc(n<2?W/2:W,ty(lr),3,0,Math.PI*2);
  ctx.fillStyle=lr>70?'var(--red)':lr<30?'var(--green)':'var(--accent)';ctx.fill();
}

// ═══ MACD ═══
function drawMACD(){
  const cs=getView();if(!cs.length)return;
  const box=document.getElementById('macdbox'),cv=document.getElementById('cvMacd');
  const W=box.clientWidth,H=box.clientHeight-18;
  cv.width=W;cv.height=H;cv.style.top='18px';
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,W,H);
  const{m,sig,h}=calcMACD(cs.map(c=>c.c)),n=m.length;
  const vals=[...m,...sig,...h].filter(v=>v!=null&&isFinite(v));
  if(!vals.length)return;
  const minV=Math.min(...vals),maxV=Math.max(...vals),rng=maxV-minV||1;
  const tx=i=>(n<2?W/2:i/(n-1))*W,ty=v=>H-((v-minV)/rng)*H,midY=ty(0);
  ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=.5;
  ctx.beginPath();ctx.moveTo(0,midY);ctx.lineTo(W,midY);ctx.stroke();
  const bw=Math.max(1,W/n*.7);
  h.forEach((v,i)=>{
    if(v==null||!isFinite(v))return;
    const x=tx(i),y=ty(v),ht=Math.abs(y-midY);
    ctx.fillStyle=v>=0?'rgba(0,230,118,.55)':'rgba(255,58,110,.55)';
    ctx.fillRect(x-bw/2,Math.min(y,midY),bw,ht);
  });
  ctx.beginPath();ctx.lineWidth=1.5;ctx.strokeStyle='#00e5ff';ctx.setLineDash([]);
  let s=false;m.forEach((v,i)=>{if(v==null)return;s?ctx.lineTo(tx(i),ty(v)):ctx.moveTo(tx(i),ty(v));s=true;});ctx.stroke();
  ctx.beginPath();ctx.lineWidth=1;ctx.strokeStyle='#ff7043';
  s=false;sig.forEach((v,i)=>{if(v==null)return;s?ctx.lineTo(tx(i),ty(v)):ctx.moveTo(tx(i),ty(v));s=true;});ctx.stroke();
}

// ═══ WEBSOCKET ═══
function connectWS(p,tf){
  try{
    S.ws=new WebSocket(`wss://stream.binance.com:9443/ws/${p.toLowerCase()}@kline_${tf}`);
    S.ws.onmessage=e=>{
      const d=JSON.parse(e.data),k=d.k;if(!k)return;
      const c={t:+k.t,o:+k.o,h:+k.h,l:+k.l,c:+k.c,v:+k.v};
      const last=S.candles.at(-1);
      if(last&&last.t===c.t)S.candles[S.candles.length-1]=c;
      else{S.candles.push(c);if(S.candles.length>500)S.candles.shift();}
      S.prices[p]=c.c;updHeader();renderAll();
    };
    S.ws.onerror=()=>{};
  }catch(e){}
}
function connectOB(p){
  try{
    S.wob=new WebSocket(`wss://stream.binance.com:9443/ws/${p.toLowerCase()}@depth5@100ms`);
    S.wob.onmessage=e=>{
      const d=JSON.parse(e.data);if(!d.asks||!d.bids)return;
      S.ob.asks=d.asks.map(r=>[+r[0],+r[1]]).slice(0,5);
      S.ob.bids=d.bids.map(r=>[+r[0],+r[1]]).slice(0,5);
      drawOB();
    };
    S.wob.onerror=()=>{};
  }catch(e){}
}
function drawOB(){
  const{asks,bids}=S.ob;if(!asks.length||!bids.length)return;
  const ma=Math.max(...asks.map(r=>r[1])),mb=Math.max(...bids.map(r=>r[1]));
  document.getElementById('asks').innerHTML=[...asks].reverse().map(([p,s])=>
    `<div class="obrow ask"><div class="obbar" style="width:${(s/ma*80).toFixed(0)}%"></div><span class="obp">${fmt(p)}</span><span class="obs">${s.toFixed(3)}</span></div>`).join('');
  document.getElementById('bids').innerHTML=bids.map(([p,s])=>
    `<div class="obrow bid"><div class="obbar" style="width:${(s/mb*80).toFixed(0)}%"></div><span class="obp">${fmt(p)}</span><span class="obs">${s.toFixed(3)}</span></div>`).join('');
  const sp=asks[0][0]-bids[0][0];
  document.getElementById('spread').textContent=`Spread: ${fmt(sp)} (${(sp/bids[0][0]*100).toFixed(3)}%)`;
}

// ═══ TICKER ═══
function buildTicker(){
  const items=PAIRS.map(p=>{
    const price=S.prices[p]||0,chg=S.chgs[p]||0,sig=S.sigs[p];
    return`<span class="tk"><span class="s">${p.replace('USDT','')}</span><span class="p">${fmt(price)}</span><span class="${chg>=0?'up':'dn'}">${chg>=0?'▲':'▼'}${Math.abs(chg).toFixed(2)}%</span>${sig&&sig!=='NEUTRAL'?`<span class="${sig==='BUY'?'up':'dn'}">${sig}</span>`:''}</span>`;
  }).join('');
  document.getElementById('ticker').innerHTML=items+items;
}
setInterval(buildTicker,5000);

// ═══ EVENTS ═══
function initEvents(){
  const box=document.getElementById('mainbox');
  box.addEventListener('wheel',e=>{
    e.preventDefault();
    const f=e.deltaY>0?1.1:.91;
    S.view.vis=Math.max(10,Math.min(S.candles.length,Math.round(S.view.vis*f)));
    renderAll();
  },{passive:false});
  box.addEventListener('mousedown',e=>{
    S.drag.on=true;S.drag.x0=e.clientX;S.drag.off0=S.view.off;
    box.style.cursor='grabbing';
  });
  window.addEventListener('mousemove',e=>{
    const rect=box.getBoundingClientRect();
    S.mouse.x=e.clientX-rect.left;S.mouse.y=e.clientY-rect.top;
    S.mouse.in=S.mouse.x>0&&S.mouse.x<rect.width&&S.mouse.y>0&&S.mouse.y<rect.height;
    if(S.drag.on){
      const slotW=(rect.width-78)/Math.max(1,S.view.vis);
      const delta=Math.round(-(e.clientX-S.drag.x0)/slotW);
      S.view.off=Math.max(0,Math.min(S.candles.length-S.view.vis,S.drag.off0+delta));
    }
    drawMain();
  });
  window.addEventListener('mouseup',()=>{S.drag.on=false;box.style.cursor='crosshair'});
  box.addEventListener('mouseleave',()=>{S.mouse.in=false;drawMain()});
  // Touch
  let t0x=0,t0off=0,p0=0;
  box.addEventListener('touchstart',e=>{
    if(e.touches.length===1){t0x=e.touches[0].clientX;t0off=S.view.off}
    if(e.touches.length===2)p0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  },{passive:true});
  box.addEventListener('touchmove',e=>{
    const rect=box.getBoundingClientRect();
    if(e.touches.length===1){
      const sw=(rect.width-78)/Math.max(1,S.view.vis);
      S.view.off=Math.max(0,Math.min(S.candles.length-S.view.vis,t0off+Math.round(-(e.touches[0].clientX-t0x)/sw)));
      drawMain();
    }
    if(e.touches.length===2){
      const d2=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      S.view.vis=Math.max(10,Math.min(S.candles.length,Math.round(S.view.vis*p0/d2)));
      p0=d2;drawMain();
    }
  },{passive:true});
}

// ═══ UTILS ═══
function fmt(n){
  if(n==null||isNaN(+n))return'—';n=+n;
  if(n>=10000)return n.toLocaleString('en',{maximumFractionDigits:1});
  if(n>=1000)return n.toLocaleString('en',{maximumFractionDigits:2});
  if(n>=1)return n.toFixed(4);
  if(n>=.001)return n.toFixed(5);
  return n.toFixed(7);
}
function fmtV(n){
  n=+n;if(!n)return'—';
  if(n>=1e9)return(n/1e9).toFixed(2)+'B';
  if(n>=1e6)return(n/1e6).toFixed(2)+'M';
  if(n>=1e3)return(n/1e3).toFixed(2)+'K';
  return n.toFixed(0);
}
function fmtT(ts,tf){
  const d=new Date(ts);
  if(tf==='1d')return d.toLocaleDateString('en',{month:'short',day:'numeric'});
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function set(id,v){const el=document.getElementById(id);if(el)el.textContent=v}
